MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '../external/pretrained/jx_vit_base_p16_224-80ecf9dd.pth'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]
  JPM: True
  SHIFT_NUM: 8
  RE_ARRANGE: True
  SIE_CAMERA: True
  SIE_VIEW: False
  SIE_COE: 3.0
  ID_LOSS_TYPE: 'softmax'
  TRIPLET_LOSS_WEIGHT: 1.0
  ID_LOSS_WEIGHT: 1.0
  DIST_TRAIN: False

INPUT:
  SIZE_TRAIN: [256, 256]
  SIZE_TEST: [256, 256]
  PROB: 0.5
  RE_PROB: 0.5
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 4

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 60
  BASE_LR: 0.008
  IMS_PER_BATCH: 16 #32
  WARMUP_METHOD: 'linear'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 20
  EVAL_PERIOD: 10
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  SEED: 1234
  CENTER_LR: 0.5
  CENTER_LOSS_WEIGHT: 0.0005
  MOMENTUM: 0.9
  MARGIN: 0.3
  COSINE_MARGIN: 0.5
  COSINE_SCALE: 30

TEST:
  EVAL: True
  IMS_PER_BATCH: 32 #64
  RE_RANKING: False
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

OUTPUT_DIR: './models/transreid_custom'