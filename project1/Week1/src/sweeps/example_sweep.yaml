name: ExampleSweep
project: C6-experiment
entity: c5-team1

program: Week1.src.evaluate
command:
  - ${env}
  - python
  - -m
  - ${program}
  - ${args}

method: random

metric:
  name: AP50
  goal: maximize

parameters:
  method:
    values: ["mog2", "lsbp"]

  alpha:
    distribution: uniform
    min: 0.05
    max: 0.6

  min_area_ratio:
    values: [0.0001, 0.0002, 0.0005, 0.001, 0.002]

  use_gray:
    values: [true, false]

  learning_rate:
    values: [-1.0, 0.001, 0.003, 0.005, 0.01, 0.02, 0.05]

  history:
    values: [50, 100, 200, 300, 500, 800, 1200]

  var_threshold:
    values: [4.0, 8.0, 12.0, 16.0, 24.0, 32.0, 48.0]

  detect_shadows:
    values: [true, false]

  bin_thresh:
    values: [32, 64, 96, 128, 160, 192]